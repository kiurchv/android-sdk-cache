name: Package Maven Dependencies

on:
  workflow_dispatch:

jobs:
  package-deps:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.5"

      - name: Clone Cull and full debug build
        run: |
          git clone https://github.com/kiurchv/Cull.git /tmp/Cull
          cd /tmp/Cull
          gradle wrapper --gradle-version=8.14.5
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -20 || true
          echo "Cache size: $(du -sh ~/.gradle/caches/modules-2/ | cut -f1)"

      - name: Package and split
        run: |
          git rm -f deps-cache.tar.gz.part* maven-cache.tar.gz.part* 2>/dev/null || true
          tar -czf /tmp/deps.tar.gz \
            -C ~/.gradle/caches \
            modules-2/files-2.1 \
            modules-2/metadata-2.106
          echo "Archive: $(du -sh /tmp/deps.tar.gz | cut -f1)"
          split -b 90m /tmp/deps.tar.gz deps-cache.tar.gz.part
          ls -lh deps-cache.tar.gz.part*
          echo "PARTS=$(ls deps-cache.tar.gz.part* | wc -l)" >> $GITHUB_ENV

      - name: Commit
        run: |
          git config user.email "sdk-bot@kiurchv.xyz"
          git config user.name "SDK Bot"
          git add deps-cache.tar.gz.part*
          git commit -m "sdk: deps cache from assembleDebug (${{ env.PARTS }} parts)"
          git push origin main

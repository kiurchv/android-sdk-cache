name: Package Gradle

on:
  workflow_dispatch:

jobs:
  package-gradle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Gradle 8.14.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.14.5-bin.zip \
            -O /tmp/gradle-8.14.5-bin.zip
          ls -lh /tmp/gradle-8.14.5-bin.zip

      - name: Split into chunks < 95MB
        run: |
          split -b 95m /tmp/gradle-8.14.5-bin.zip gradle-8.14.5-bin.zip.part
          ls -lh gradle-8.14.5-bin.zip.part*

      - name: Commit to repo
        run: |
          git config user.email "sdk-bot@kiurchv.xyz"
          git config user.name "SDK Bot"
          git add gradle-8.14.5-bin.zip.part*
          git commit -m "sdk: add gradle-8.14.5-bin split into 95MB chunks" || echo "Nothing to commit"
          git push origin main

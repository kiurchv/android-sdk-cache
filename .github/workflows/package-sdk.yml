name: Package Android SDK

on:
  workflow_dispatch:

jobs:
  package-sdk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package and commit SDK into repo
        run: |
          BT=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          echo "Packaging build-tools: $BT"

          tar -czf build-tools-${BT}.tar.gz \
            -C $ANDROID_SDK_ROOT/build-tools $BT

          tar -czf platform-android-35.tar.gz \
            -C $ANDROID_SDK_ROOT/platforms android-35

          echo "=== Sizes ==="
          ls -lh *.tar.gz

          git config user.email "sdk-bot@kiurchv.xyz"
          git config user.name "SDK Bot"
          git add *.tar.gz
          git commit -m "sdk: add build-tools-${BT} and platform-android-35"
          git push origin main
